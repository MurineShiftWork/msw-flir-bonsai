site_name: msw-flir-bonsai
site_description: FLIR camera control via Bonsai for murine shift work experiments
site_url: https://larsrollik.github.io/msw-flir-bonsai/
repo_url: https://github.com/larsrollik/msw-flir-bonsai
repo_name: larsrollik/msw-flir-bonsai
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: teal
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting_started.md
  - Concepts: concepts.md
  - Usage: usage.md
  - Detailed usage:
      - CLI reference: usage/cli.md
      - Python API: usage/python.md
      - Bonsai workflows: usage/workflows.md
  - API reference: api.md
